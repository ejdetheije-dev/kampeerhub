services:
  - type: web
    name: kampeerhub
    runtime: docker
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NEXT_PUBLIC_MAPBOX_TOKEN
        sync: false
      - key: DATABASE_PATH
        value: /data/kampeerhub.db
    disk:
      name: kampeerhub-data
      mountPath: /data
      sizeGB: 1
